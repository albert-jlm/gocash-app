name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      APP_URL: https://gocash.zether.net
      NODE_ENV: production
    steps:
      - uses: actions/checkout@v4

      - uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TS_AUTH_KEY }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy web app
        run: |
          rsync -avz --delete out/ zether@${{ secrets.SERVER_HOST }}:/home/zether/gocash-app/out/

      - name: Deploy edge functions
        run: |
          rsync -avz --delete supabase/functions/main/ zether@${{ secrets.SERVER_HOST }}:/home/zether/homelab/supabase/volumes/functions/main/

      - name: Apply SQL migrations
        run: |
          for f in supabase/migrations/*.sql; do
            echo "Applying $(basename $f)..."
            ssh zether@${{ secrets.SERVER_HOST }} \
              "docker compose -f ~/homelab/supabase/docker-compose.yml exec -T db psql -U supabase_admin -d postgres" < "$f"
          done

      - name: Restart edge-runtime & refresh schema cache
        run: |
          ssh zether@${{ secrets.SERVER_HOST }} "cd ~/homelab/supabase && docker compose restart functions rest"
